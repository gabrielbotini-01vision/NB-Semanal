<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Business · Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===== TOKENS — Stravix admin (minimalista, arejado) × laranja Hotmart ===== */
  :root{
    --orange:#FF4000; --orange-600:#E23A00; --orange-050:#FFF1EC; --orange-100:#FFE0D4;
    --ink:#101828; --white:#FFFFFF;
    --bg:#F4F5F4; --surface:#FFFFFF; --surface-2:#F8F9FA; --surface-sunken:#F3F4F3;
    --sidebar:#FFFFFF;
    --border:#EDECE9; --border-2:#E4E6E4;
    --text:#101828; --text-muted:#667085; --text-faint:#98A2B3;
    --accent:var(--orange); --accent-weak:var(--orange-050);
    --success:#12B76A; --success-bg:#ECFDF3; --warn:#F79009; --warn-bg:#FFFAEB;
    --danger:#F04438; --danger-bg:#FEF3F2; --danger-text:#F04438;
    --track:#EFF0EF;
    /* aliases legados usados pelo JS (categorias = laranja + cinzas) */
    --black:#101828; --off-white:var(--bg); --blue:#7A8699; --purple:#B0AAA2;
    --maroon:var(--orange-600); --lemon:var(--success); --yellow:var(--warn); --gray:#C3BFB8;
    --surface-dark:#101828; --on-dark:#fff; --border-strong:var(--border-2);

    --sh-card:0 1px 2px rgba(16,24,40,.05); --sh-sm:0 1px 2px rgba(16,24,40,.06);
    --sh-md:0 4px 14px rgba(16,24,40,.07); --sh-lg:0 12px 32px rgba(16,24,40,.14);
    --font-sans:"DM Sans","Inter","Arial",sans-serif; --font-mono:"DM Mono",ui-monospace,monospace;
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px;
    --r-sm:10px; --r-md:16px; --r-lg:20px; --r-pill:999px;
    --sidebar-w:236px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  ::selection{background:var(--orange);color:#fff}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint)}

  /* ===== LAYOUT ===== */
  .layout{display:flex;min-height:100vh}
  .scrim{display:none}
  .sidebar{width:var(--sidebar-w);flex:none;background:var(--sidebar);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:18px 14px}
  .side-brand{display:flex;align-items:center;padding:8px 8px 18px}
  .side-logo .hotmark{display:block;font-size:22px;font-weight:700;letter-spacing:-.045em;color:var(--orange);line-height:1}
  .side-logo small{display:block;margin-top:6px;color:var(--text-faint);font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
  .side-nav{display:flex;flex-direction:column;gap:4px;margin-top:4px}
  .side-nav .tab{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;font-size:13.5px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:background .15s,color .15s}
  .side-nav .tab .ic{width:18px;height:18px;flex:none;display:inline-flex;align-items:center;justify-content:center}
  .side-nav .tab .ic svg{width:18px;height:18px;stroke-width:2}
  .side-nav .tab:hover{background:var(--surface-2);color:var(--text)}
  .side-nav .tab.on{background:var(--accent);color:#fff;box-shadow:0 8px 18px rgba(255,64,0,.26)}
  .side-foot{margin-top:auto;padding-top:14px}
  .side-note{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:11px;color:var(--text-muted);line-height:1.5}
  .side-note b{color:var(--text)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
  .appbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:11px 26px;min-height:64px}
  .menu-btn{display:none;background:var(--surface);border:1px solid var(--border-2);border-radius:10px;width:38px;height:38px;font-size:17px;cursor:pointer;color:var(--text);align-items:center;justify-content:center;flex:none}
  .appbar-title h1{font-size:19px;font-weight:700;letter-spacing:-.02em}
  .appbar-title .crumb{font-size:12px;color:var(--text-faint);margin-top:1px}
  .appbar-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end}
  .profile{display:flex;align-items:center;gap:9px}
  .profile .pf b{font-size:13px;display:block;line-height:1.15}
  .profile .pf small{font-size:11px;color:var(--text-faint)}

  .controls{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .ctl{display:flex;flex-direction:column;gap:4px}
  .ctl label{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint)}
  select.sel{font-family:inherit;font-size:13px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--border-2);border-radius:10px;padding:8px 10px;cursor:pointer;max-width:130px;outline:none}
  select.sel:focus{border-color:var(--accent)}
  #selSemana,#selSemanaArea{max-width:150px}

  .subbar{padding:14px 26px 0}
  .subbar #subtabs{display:inline-flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:4px}
  .subtab{cursor:pointer;padding:7px 16px;border-radius:9px;font-weight:600;font-size:12.5px;color:var(--text-muted)}
  .subtab:hover{color:var(--text)}
  .subtab.on{background:var(--surface);color:var(--accent);box-shadow:var(--sh-sm)}

  .banner{display:flex;align-items:center;gap:9px;padding:14px 26px 0;font-size:12px;color:var(--text-muted)}
  .banner .dotmini{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
  .banner b{color:var(--text)}

  .content{padding:24px 26px 20px;display:flex;flex-direction:column}
  .pagefoot{padding:20px 26px 40px;color:var(--text-faint);font-size:12px}

  .sec{margin-bottom:30px}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .sec-head h2{font-size:17px;font-weight:700;letter-spacing:-.015em}
  .sec-head .hint{font-size:12px;color:var(--text-faint)}

  .grid{display:grid;gap:18px}
  .g6{grid-template-columns:repeat(6,1fr)} .g5{grid-template-columns:repeat(5,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:1180px){.g6,.g5{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:920px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
  @media(max-width:640px){.g6,.g5,.g4,.g2{grid-template-columns:1fr}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:22px;box-shadow:var(--sh-card);position:relative;overflow:hidden}

  /* KPI stat */
  /* estrutura fixa título / corpo / rodapé — evita os componentes "sambarem" entre cards:
     o título sempre ocupa 2 linhas e o rodapé (.sub) fica ancorado no fundo. */
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:20px;box-shadow:var(--sh-card);position:relative;display:flex;flex-direction:column;min-height:128px}
  .kpi .rail{display:none}
  .kpi .lbl{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px}
  .kpi .sub2{font-size:11px;color:var(--text-faint);line-height:1.35;margin-bottom:14px;min-height:30px}
  .kpi .num{font-size:27px;font-weight:700;color:var(--text);line-height:1.1;letter-spacing:-.02em}
  .kpi .num.n{color:var(--text)}
  .kpi .sub{font-size:12px;color:var(--text-muted);margin-top:auto;padding-top:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .kpi .prog{height:8px;background:var(--track);border-radius:var(--r-pill);overflow:hidden;margin-top:14px}
  .kpi .prog i{display:block;height:100%;background:var(--accent);border-radius:var(--r-pill)}
  .att{font-weight:700;font-family:var(--font-sans);font-size:11px;padding:3px 9px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
  .att.hi{color:var(--success);background:var(--success-bg)} .att.mid{color:#B54708;background:var(--warn-bg)} .att.lo{color:var(--danger);background:var(--danger-bg)}

  /* funnel */
  .funnel{display:flex;flex-direction:column;gap:3px}
  .fstage{display:grid;grid-template-columns:120px 1fr;align-items:center;gap:14px}
  .fstage .nm{text-align:right;font-size:13px;font-weight:600}
  .fstage .track{height:36px;background:var(--track);border-radius:10px;position:relative;overflow:hidden}
  .fstage .fill{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:12px;color:#fff;font-weight:700;font-size:14px;min-width:44px}
  .fstage .bud{position:absolute;top:-3px;bottom:-3px;width:2.5px;background:var(--text);opacity:.45}
  .fstage .bud::after{content:attr(data-b);position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9.5px;color:var(--text-muted);white-space:nowrap;font-family:var(--font-mono)}
  .conv{grid-column:2;font-size:10.5px;font-weight:700;color:var(--text-faint);font-family:var(--font-mono);padding-left:2px}

  /* bars */
  .barrow{margin-bottom:16px} .barrow:last-child{margin-bottom:0}
  .barrow .top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:6px}
  .barrow .top .v{font-family:var(--font-mono)}
  .barrow .bar{height:10px;background:var(--track);border-radius:var(--r-pill);overflow:hidden;position:relative}
  .barrow .bar i{display:block;height:100%;border-radius:var(--r-pill)}
  .barrow .bar .tgt{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text);opacity:.4}

  /* tiles */
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-4);text-align:center;box-shadow:var(--sh-card)}
  .tile .v{font-size:25px;font-weight:700;color:var(--text);line-height:1;font-family:var(--font-mono)}
  .tile .k{font-size:11px;color:var(--text-muted);margin-top:6px}

  /* trend */
  .b{border-radius:5px 5px 0 0}
  .trend{display:flex;align-items:flex-end;gap:4px;height:150px;padding-top:20px}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
  .trend .b{width:100%;max-width:26px;background:var(--accent);border-radius:5px 5px 0 0;position:relative;transition:height .2s}
  .trend .b:hover{background:var(--orange-600)}
  .trend .cap{font-size:8.5px;color:var(--text-faint);font-family:var(--font-mono);white-space:nowrap;transform:rotate(-45deg);transform-origin:center;margin-top:6px}

  /* estoque do funil SDR — barras empilhadas (snapshot por semana) */
  .estoque{display:flex;align-items:flex-end;gap:4px;min-height:236px;padding-top:8px;padding-bottom:2px}
  .ecol{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
  .etot{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text-muted);margin-bottom:4px;white-space:nowrap}
  .eseg{width:100%;max-width:30px}
  .eseg:first-of-type{border-radius:5px 5px 0 0}
  .ecap{font-size:8.5px;color:var(--text-faint);font-family:var(--font-mono);white-space:nowrap;transform:rotate(-45deg);transform-origin:center;margin-top:8px}

  /* weektrend */
  .wtgrid{display:grid;gap:18px} .wt{min-width:0}
  .wttop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:8px;flex-wrap:wrap}
  .wtlabel{font-size:12.5px;font-weight:600} .wtsub{color:var(--text-faint);font-weight:500;font-size:11px}
  .wtwow{font-family:var(--font-sans);font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--r-pill)}
  .wtwow.up{color:var(--success);background:var(--success-bg)} .wtwow.down{color:var(--danger);background:var(--danger-bg)}
  .wtchart{display:flex;align-items:flex-end;gap:7px;height:100px;border-bottom:1px solid var(--border)}
  .wtcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100px;min-width:0}
  .wtval{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:3px;white-space:nowrap}
  .wtval.cur{font-weight:700;color:var(--text)}
  .wtbar{width:100%;max-width:28px;border-radius:5px 5px 0 0}
  .wtlbl{font-size:9.5px;color:var(--text-faint);font-weight:500;margin-top:5px}
  .wtlbl.cur{color:var(--text);font-weight:700}
  .wtlegend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text-faint);margin-top:14px}
  .wtlegend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}

  /* table */
  table.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;font-size:13.5px;box-shadow:var(--sh-card)}
  table.tbl thead th{background:var(--surface);color:var(--text-faint);text-align:left;font-weight:700;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;padding:12px 16px;white-space:nowrap;border-bottom:1px solid var(--border)}
  table.tbl th.r,table.tbl td.r{text-align:right}
  table.tbl td{padding:12px 16px;border-top:1px solid var(--border)}
  table.tbl tbody tr:first-child td{border-top:none}
  table.tbl tbody tr.rankrow{cursor:pointer}
  table.tbl tbody tr.rankrow:hover{background:var(--surface-2)}
  table.tbl tbody tr.grouprow td{background:var(--surface-2);font-weight:700;font-size:12px;color:var(--text-muted)}
  .num-cell{font-family:var(--font-mono);color:var(--accent);font-weight:700}
  .idx{color:var(--text-faint);margin-right:8px}
  .rankbar{height:7px;background:var(--track);border-radius:var(--r-pill);overflow:hidden;min-width:60px}
  .rankbar i{display:block;height:100%;background:var(--accent);border-radius:var(--r-pill)}
  .ministack{display:flex;height:14px;width:100px;border-radius:5px;overflow:hidden}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--text-muted);margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend .sw{width:12px;height:12px;border-radius:4px;flex:none}
  .miss{color:var(--text-faint);font-style:italic}

  /* 1:1 Gestor */
  .oneone{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start}
  .oneone-side{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;max-height:80vh;overflow-y:auto;position:sticky;top:88px;box-shadow:var(--sh-card)}
  .oneone-side input{width:100%;border:1px solid var(--border-2);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;background:var(--surface)}
  .oneone-side input:focus{border-color:var(--accent)}
  .oneone-item{padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:9px}
  .oneone-item:hover{background:var(--surface-2)}
  .oneone-item.on{background:var(--accent-weak);color:var(--orange-600);font-weight:700}
  @media(max-width:860px){.oneone{grid-template-columns:1fr}.oneone-side{position:static;max-height:none}}

  .avatar{position:relative;border-radius:50%;overflow:hidden;background:var(--surface-sunken);display:flex;align-items:center;justify-content:center;flex:none}
  .avatar-fallback{font-family:var(--font-sans);font-weight:700;color:var(--text-faint);letter-spacing:.02em}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

  .statrow{display:flex;gap:26px;flex-wrap:wrap}
  .stat{text-align:right}
  .stat .v{font-family:var(--font-mono);font-size:19px;font-weight:700;margin-top:2px}
  .indic{display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);font-size:12.5px}
  .indic:first-child{border-top:none}
  .indic .k{color:var(--text-muted)} .indic .v{font-family:var(--font-mono);font-weight:600}
  .coachgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:860px){.coachgrid{grid-template-columns:1fr}}
  .coachbox ul{margin:0;padding-left:16px;display:flex;flex-direction:column;gap:7px}
  .coachbox li{font-size:12.5px;line-height:1.4}

  /* ===== responsivo ===== */
  @media(max-width:900px){
    .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .25s ease;z-index:60;box-shadow:var(--sh-lg)}
    body.side-open .sidebar{transform:translateX(0)}
    .scrim{display:block;position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:55;opacity:0;pointer-events:none;transition:opacity .25s}
    body.side-open .scrim{opacity:1;pointer-events:auto}
    .menu-btn{display:inline-flex}
    .profile .pf{display:none}
    .appbar{padding:11px 16px} .content{padding:18px 16px 16px}
    .subbar,.banner,.pagefoot{padding-left:16px;padding-right:16px}
  }
</style>
</head>
<body>
<div class="scrim" id="scrim"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="side-brand"><div class="side-logo"><span class="hotmark">hotmart</span><small>New Business · Cockpit</small></div></div>
    <nav class="side-nav" id="tabs"></nav>
    <div class="side-foot"><div class="side-note"><b>Dados agregados</b> das bases NB + budget/reforecast.<br><span id="genAt"></span></div></div>
  </aside>
  <div class="main">
    <header class="appbar">
      <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
      <div class="appbar-title"><h1 id="pageTitle">—</h1><div class="crumb" id="ctxLine"></div></div>
      <div class="appbar-right">
        <div class="controls" id="wsalesControls">
          <div class="ctl"><label>Mês</label><select id="selMes" class="sel"></select></div>
          <div class="ctl"><label>Semana</label><select id="selSemana" class="sel"></select></div>
          <div class="ctl"><label>Estratégia</label><select id="selEstr" class="sel"></select></div>
          <div class="ctl"><label>Referência</label><select id="selRef" class="sel">
            <option value="budget">Budget</option><option value="reforecast">Reforecast</option></select></div>
        </div>
        <div class="controls" id="wareaControls" style="display:none">
          <div class="ctl"><label>Mês</label><select id="selMesArea" class="sel"></select></div>
          <div class="ctl"><label>Semana</label><select id="selSemanaArea" class="sel"></select></div>
          <div class="ctl" id="ctlEstrArea"><label>Estratégia</label><select id="selEstrArea" class="sel"></select></div>
          <div class="ctl"><label>Referência</label><select id="selRefArea" class="sel">
            <option value="budget">Budget</option><option value="reforecast">Reforecast</option></select></div>
        </div>
        <div class="controls" id="mensalControls" style="display:none">
          <div class="ctl"><label>Mês</label><select id="selMesMensal" class="sel"></select></div>
          <div class="ctl"><label>Estratégia</label><select id="selEstrMensal" class="sel"></select></div>
        </div>
        <div class="controls" id="otherControls" style="display:none"></div>
        <div class="profile"><div class="avatar" style="width:36px;height:36px"><span class="avatar-fallback" style="font-size:13px">GB</span></div><div class="pf"><b>Guilherme</b><small>New Business</small></div></div>
      </div>
    </header>
    <div class="subbar" id="subbar" style="display:none"><div id="subtabs"></div></div>
    <div class="banner"><span class="dotmini"></span><span id="bannerText"><b>Dados agregados</b> das bases NB + budget/reforecast.</span></div>
    <main class="content">
      <div id="viewMensal" style="display:none"></div>
      <div id="viewSemanal" style="display:none"></div>
      <div id="viewArea" style="display:none"></div>
      <div id="viewOneOne" style="display:none"></div>
    </main>
    <footer class="pagefoot">Cockpit New Business · agregação client-side sobre bases pré-tratadas (Redshift → CSV → build_data.js).</footer>
  </div>
</div>

<script src="app_data.js"></script>
<script>
const $=id=>document.getElementById(id);
const D=window.DATA||{};
const STR_ORDER=D.estrategias||['Outbound','Inbound','Hunting'];
// filtros de Mês (Mensal Sales, Semanal Sales, Semanal Área) só mostram este ano — ajustar
// aqui quando virar o ano.
const FILTRO_ANO='2026';
const NIV=D.niveis||['N2-N3','N4-N5','N6+'];
// categorias: laranja (o que importa) + rampa de cinza (Stravix minimalista)
const STR_COLOR={Outbound:'var(--accent)',Inbound:'#344054',Hunting:'#98A2B3'};
const NIV_COLOR={'N2-N3':'#98A2B3','N4-N5':'#344054','N6+':'var(--accent)'};

// ---- formatação ----
const nf=new Intl.NumberFormat('pt-BR');
const fN=n=>n==null?'—':nf.format(Math.round(n||0));
const fBRL=n=>{if(n==null)return '—';n=n||0;const a=Math.abs(n);
  if(a>=1e6)return 'R$ '+(n/1e6).toFixed(1).replace('.',',')+' mi';
  if(a>=1e3)return 'R$ '+Math.round(n/1e3)+' mil';return 'R$ '+fN(n);};
const pct=(a,b)=>(b>0&&a!=null)?Math.round(a/b*100):null;
const pctR=r=>r==null?null:Math.round(r*100);
const attClass=p=>p==null?'':p>=100?'hi':p>=80?'mid':'lo';
const sum=(arr,f)=>arr.reduce((s,x)=>s+(f(x)||0),0);
const shortEmail=e=>(e||'').replace('@hotmart.com','');
const displayName=p=>p.nome||shortEmail(p.email);
const initials=name=>{const parts=(name||'').trim().split(/\s+/);return ((parts[0]?.[0]||'')+(parts[1]?.[0]||'')).toUpperCase()||'?';};
function avatarHTML(p,size){
  size=size||36;
  const name=displayName(p);
  const img=p.foto?`<img src="${p.foto}" alt="" loading="lazy" onerror="this.style.display='none'">`:'';
  return `<div class="avatar" style="width:${size}px;height:${size}px"><span class="avatar-fallback" style="font-size:${Math.round(size*0.38)}px">${initials(name)}</span>${img}</div>`;
}
function median(arr){const a=[...arr].filter(v=>v!=null).sort((x,y)=>x-y);const n=a.length;if(!n)return 0;return n%2?a[(n-1)/2]:(a[n/2-1]+a[n/2])/2;}

let state={meeting:'wsales',area:'sdr',mes:null,semana:null,estr:'all',ref:'budget',mesArea:null,semanaArea:null,refArea:'budget',estrArea:'all',mesMensal:null,estrMensal:'all',pessoa:null};

};
const MEETINGS=[{k:'mensal',label:'Mensal Sales'},{k:'wsales',label:'Semanal Sales'},{k:'warea',label:'Semanal Área'},{k:'oneone',label:'1:1 Gestor'}];
const AREA_TABS=[{k:'sdr',label:'SDR'},{k:'closers',label:'Closers'},{k:'onboarding',label:'Onboarding'}];

function mesLabel(m){if(!m)return '—';const [y,mm]=m.split('-');const nomes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return nomes[+mm-1]+'/'+y;}

// ---- WeekTrend: pequeno múltiplo de 4 semanas (Últ. em destaque) ----
function weekTrendHTML({label,sub,color,series,fmt}){
  fmt=fmt||fN;
  const vals=(series||[]).map(s=>s.valor);
  const max=(Math.max(...vals,1))*1.18;
  const last=vals.length?vals[vals.length-1]:null;
  const prior=vals.length>1?vals[vals.length-2]:null;
  const wow=(prior!=null&&prior>0&&last!=null)?Math.round((last-prior)/prior*100):null;
  const cols=(series||[]).map((s,i)=>{
    const h=Math.max(2,(s.valor/max)*100);
    const isLast=i===series.length-1;
    return `<div class="wtcol" title="${s.semana}: ${fmt(s.valor)}">
      <div class="wtval ${isLast?'cur':''}">${fmt(s.valor)}</div>
      <div class="wtbar" style="height:${h}px;background:${color};opacity:${isLast?1:.4}"></div>
      <div class="wtlbl ${isLast?'cur':''}">${s.semana.replace(/^\d{4}-/,'')}</div></div>`;
  }).join('');
  return `<div class="wt">
    <div class="wttop"><span class="wtlabel">${label}${sub?` <span class="wtsub">· ${sub}</span>`:''}</span>
    ${wow!=null?`<span class="wtwow ${wow>=0?'up':'down'}">${wow>=0?'▲':'▼'} ${Math.abs(wow)}% WoW</span>`:''}</div>
    <div class="wtchart">${cols||'<span class="miss">sem dado</span>'}</div>
  </div>`;
}
function weeklyTotals(metricObj){
  const weeks=Object.keys(metricObj||{}).sort();
  return weeks.map(w=>({semana:w,valor:NIV.reduce((s,n)=>s+((metricObj[w]||{})[n]||0),0)}));
}
function weeklyByNivel(metricObj,nivel){
  const weeks=Object.keys(metricObj||{}).sort();
  return weeks.map(w=>({semana:w,valor:(metricObj[w]||{})[nivel]||0}));
}

// ---- tabela agrupada / ranking ----
function groupedTable({rows,groupBy,groupOrder,groupLabel,cols,kind}){
  if(!rows||!rows.length) return '<div class="card"><span class="miss">Sem pessoas com dado no período.</span></div>';
  let body='';
  if(groupBy){
    const groups={};
    rows.forEach(r=>{const g=groupBy(r);(groups[g]=groups[g]||[]).push(r);});
    const order=(groupOrder||Object.keys(groups)).filter(g=>groups[g]&&groups[g].length);
    order.forEach(g=>{
      const items=groups[g];
      body+=`<tr class="grouprow"><td>${groupLabel?groupLabel(g):g} <span class="miss">· ${items.length}</span></td>${cols.map(()=>'<td></td>').join('')}</tr>`;
      body+=items.map((r,i)=>rowHTML(r,i,cols,kind)).join('');
    });
  } else {
    body=rows.map((r,i)=>rowHTML(r,i,cols,kind)).join('');
  }
  return `<div class="card" style="padding:0;overflow-x:auto"><table class="tbl">
    <thead><tr><th>Pessoa</th>${cols.map(c=>`<th class="${c.align==='r'?'r':''}">${c.label}</th>`).join('')}</tr></thead>
    <tbody>${body}</tbody></table></div>`;
}
function rowHTML(r,i,cols,kind){
  return `<tr class="rankrow" data-email="${r.email}" data-kind="${kind}">
    <td><span class="mono idx">${String(i+1).padStart(2,'0')}</span>
      <span style="display:inline-flex;align-items:center;gap:8px;vertical-align:middle">${avatarHTML(r,22)}${displayName(r)}</span></td>
    ${cols.map(c=>`<td class="${c.align==='r'?'r':''}">${c.render(r)}</td>`).join('')}
  </tr>`;
}
function bindRowClicks(root){
  root.querySelectorAll('tr.rankrow').forEach(tr=>{
    tr.onclick=()=>{ state.meeting='oneone'; state.pessoa={email:tr.dataset.email,kind:tr.dataset.kind}; render(); };
  });
}
function ministack(vals,colors){
  const t=vals.reduce((a,b)=>a+b,0)||1;
  return `<div class="ministack">${vals.map((v,i)=>`<div style="width:${v/t*100}%;background:${colors[i]}" title="${NIV[i]}: ${fN(v)}"></div>`).join('')}</div>`;
}
// ================= MENSAL SALES =================
const MENSAL_KPIS=[
  {k:'receita',lbl:'Net Revenue',cur:1,desc:'Receita líquida no mês fechado'},
  {k:'opps',lbl:'Opp',cur:0,desc:'Oportunidades criadas no mês'},
  {k:'cw',lbl:'CW',cur:0,desc:'Negócios fechados (Closed Won)'},
  {k:'gmv',lbl:'GMV',cur:1,desc:'Volume bruto transacionado'},
  {k:'activation',lbl:'Ativação 10K',cur:0,desc:'Contas ativadas (10k GMV)'},
];
function mensalKpiCard(c,act,bud,actPrev,mes){
  const a=act?.[c.k]||0, b=bud?.[c.k]||0, aprev=actPrev?.[c.k];
  const att=pct(a,b);
  const mom=aprev?Math.round((a-aprev)/aprev*100):null;
  return `<div class="kpi"><span class="rail"></span><div class="lbl">${c.lbl}</div>
    <div class="sub2">${c.desc||''}</div>
    <div class="num${c.cur?'':' n'}">${c.cur?fBRL(a):fN(a)}</div>
    <div class="sub"><span>de ${c.cur?fBRL(b):fN(b)} budget${att!=null?' · '+att+'%':''}</span>${mom!=null?`<span class="att ${mom>=0?'hi':'lo'}">${mom>=0?'▲':'▼'} ${Math.abs(mom)}% MoM</span>`:''}</div></div>`;
}
function metricsForMes(src,mes,estr){
  const m=D[src]?.mensal?.[mes]; if(!m) return null;
  if(estr==='all') return m.total;
  return m.porEstrategia?.[estr]||null;
}
// soma um metric por nível através de uma lista de meses (mês fechado = 1 mês; YTD = Jan..mês
// fechado), respeitando o filtro de estratégia via o cruzamento porNivelEstrategia.
function nivelTotal(mesesList,dataset,nivel,metric,estr){
  return mesesList.reduce((s,m)=>{
    const cell=estr==='all'?dataset?.[m]?.porNivel?.[nivel]:dataset?.[m]?.porNivelEstrategia?.[nivel]?.[estr];
    return s+(cell?.[metric]||0);
  },0);
}
const NIVEL_ROWS=[['Opps','opps',0],['CW','cw',0],['Ativação','activation',0],['Net Revenue','receita',1]];
function nivelMiniTable(nivel,mesesList,estr){
  const trs=NIVEL_ROWS.map(([label,key,cur])=>{
    const a=nivelTotal(mesesList,D.actual.mensal,nivel,key,estr), b=nivelTotal(mesesList,D.budget.mensal,nivel,key,estr);
    const p=pct(a,b);
    return `<tr><td style="font-weight:600">${label}</td>
      <td class="r mono">${cur?fBRL(a):fN(a)}</td>
      <td class="r mono" style="color:var(--text-muted)">${cur?fBRL(b):fN(b)}</td>
      <td class="r mono" style="font-weight:700">${p!=null?p+'%':'—'}</td></tr>`;
  }).join('');
  return `<div class="card" style="padding:0;overflow-x:auto;margin-bottom:14px">
    <div style="padding:12px 16px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px">
      <span style="width:9px;height:9px;border-radius:3px;background:${NIV_COLOR[nivel]};display:inline-block"></span>${nivel}
    </div>
    <table class="tbl" style="box-shadow:none;border:none;border-radius:0"><thead><tr><th></th><th class="r">Actual</th><th class="r">Meta</th><th class="r">% Ating.</th></tr></thead>
    <tbody>${trs}</tbody></table></div>`;
}
// filtro em cascata Mês → (todos os componentes da página) + Estratégia — trocar o mês aqui
// redefine o que é "mês fechado" e recalcula o YTD (Jan até o mês selecionado) na hora.
function initMensalControls(){
  const mesesComActual=Object.keys(D.actual.mensal).filter(m=>m.startsWith(FILTRO_ANO)).sort();
  state.mesMensal=D.mesFechado?.mes&&mesesComActual.includes(D.mesFechado.mes)?D.mesFechado.mes:mesesComActual[mesesComActual.length-1];
  $('selMesMensal').innerHTML=mesesComActual.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');
  $('selMesMensal').value=state.mesMensal;
  $('selEstrMensal').innerHTML=`<option value="all">Todas</option>`+STR_ORDER.map(s=>`<option value="${s}">${s}</option>`).join('');
  $('selEstrMensal').value=state.estrMensal;
  $('selMesMensal').onchange=e=>{state.mesMensal=e.target.value;renderMensal();};
  $('selEstrMensal').onchange=e=>{state.estrMensal=e.target.value;renderMensal();};
}
function renderMensal(){
  const mes=state.mesMensal, estr=state.estrMensal;
  const idx=D.meses.indexOf(mes), prev=D.meses[idx-1];
  const act=metricsForMes('actual',mes,estr), bud=metricsForMes('budget',mes,estr), actPrev=metricsForMes('actual',prev,estr);
  if(!mes||!act){ $('viewMensal').innerHTML='<div class="card"><span class="miss">Sem dado suficiente para este mês/estratégia — rode build_data.js com os CSVs atualizados.</span></div>'; return; }

  const kpis=`<div class="grid g5">${MENSAL_KPIS.map(c=>mensalKpiCard(c,act,bud,actPrev,mes)).join('')}</div>`;

  const year=mes.slice(0,4);
  const ytdMonths=D.meses.filter(m=>m.startsWith(year)&&m<=mes).sort();
  const yearVals=ytdMonths.map(m=>({m,a:metricsForMes('actual',m,estr)?.receita||0,b:metricsForMes('budget',m,estr)?.receita||0}));
  const maxYv=Math.max(...yearVals.flatMap(v=>[v.a,v.b]),1);
  // uma tabela só (barras + dados) pra garantir que as colunas de mês fiquem exatamente
  // alinhadas — duas tabelas/elementos separados nunca batem 100% porque a coluna de rótulo
  // ("Actual"/"Budget"/"Ating.") desloca as colunas de mês de um jeito que o gráfico não tem.
  const chart=`
    <div style="display:flex;gap:16px;align-items:center;margin-bottom:14px;font-size:11px;color:var(--text-muted)">
      <span style="display:inline-flex;align-items:center;gap:5px"><i style="width:9px;height:9px;background:var(--accent);border-radius:3px;display:inline-block"></i>Actual</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><i style="width:9px;height:9px;background:#D0D5DD;border-radius:3px;display:inline-block"></i>Budget</span>
    </div>
    <table class="tbl" style="box-shadow:none">
      <thead><tr><th></th>${yearVals.map(v=>`<th style="text-align:center">${mesLabel(v.m)}</th>`).join('')}</tr></thead>
      <tbody>
        <tr>
          <td></td>
          ${yearVals.map(v=>{
            const isClosed=v.m===mes;
            const hA=Math.max(2,v.a/maxYv*190), hB=Math.max(2,v.b/maxYv*190);
            return `<td style="vertical-align:bottom">
              <div style="display:flex;justify-content:center;align-items:flex-end;gap:3px;height:190px">
                <div class="b" style="width:18px;max-width:none;height:${hA}px;background:var(--accent);opacity:${isClosed?1:.55}" title="Actual ${mesLabel(v.m)}: ${fBRL(v.a)}"></div>
                <div class="b" style="width:18px;max-width:none;height:${hB}px;background:#D0D5DD" title="Budget ${mesLabel(v.m)}: ${fBRL(v.b)}"></div>
              </div></td>`;
          }).join('')}
        </tr>
        <tr><td style="font-weight:600">Actual</td>${yearVals.map(v=>`<td class="mono" style="text-align:center">${fBRL(v.a)}</td>`).join('')}</tr>
        <tr><td style="font-weight:600;color:var(--text-muted)">Budget</td>${yearVals.map(v=>`<td class="mono" style="text-align:center;color:var(--text-muted)">${fBRL(v.b)}</td>`).join('')}</tr>
        <tr><td style="font-weight:600">Ating.</td>${yearVals.map(v=>{const p=pct(v.a,v.b);return `<td class="mono" style="text-align:center;font-weight:700">${p!=null?p+'%':'—'}</td>`;}).join('')}</tr>
      </tbody></table>`;

  $('viewMensal').innerHTML=`
    <div class="sec"><div class="sec-head"><h2>Realização vs meta · mês fechado</h2><span class="hint">${mesLabel(mes)} · ${estr==='all'?'todas estratégias':estr}</span></div>${kpis}</div>
    <div class="sec"><div class="sec-head"><h2>Net Revenue · ${year} (YTD)</h2><span class="hint">actual vs budget, jan → mês selecionado</span></div>
      <div class="card" style="padding:24px;overflow-x:auto">${chart}</div></div>
    <div class="sec"><div class="sec-head"><h2>Fechamento por nível de cliente</h2><span class="hint">realizado vs meta</span></div>
      <div class="grid g2">
        <div><div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px">Mês fechado — ${mesLabel(mes)}</div>${NIV.map(n=>nivelMiniTable(n,[mes],estr)).join('')}</div>
        <div><div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px">Year to date — ${year}</div>${NIV.map(n=>nivelMiniTable(n,ytdMonths,estr)).join('')}</div>
      </div>
    </div>`;
}

// ================= SEMANAL SALES =================
function semanaLabel(w){ if(!w)return '—'; const [y,ww]=w.split('-W'); return 'semana '+(+ww)+'/'+y; }
function weeksInMonth(mes,pool){ return pool.filter(w=>D.semanaMes[w]===mes); }
// filtro em cascata Mês → Semana: o select de Mês restringe quais semanas aparecem no select
// de Semana (só as que pertencem àquele mês, via D.semanaMes calculado no build_data.js).
function initWsalesControls(){
  const semanasAtivas=D.semanas.filter(w=>D.actual.semanal[w]||D.budget.semanal[w]);
  const mesesAtivos=[...new Set(semanasAtivas.map(w=>D.semanaMes[w]))].filter(m=>m.startsWith(FILTRO_ANO)).sort();
  const comFunil=Object.keys(D.actual.semanal).filter(w=>D.actual.semanal[w].total.contacted>0).sort();
  const def=comFunil.pop()||Object.keys(D.actual.semanal).sort().pop();
  state.semana=def&&semanasAtivas.includes(def)?def:semanasAtivas[semanasAtivas.length-1];
  state.mes=D.semanaMes[state.semana]||mesesAtivos[mesesAtivos.length-1];

  function renderSemanaOptions(){
    const ws=weeksInMonth(state.mes,semanasAtivas);
    $('selSemana').innerHTML=ws.map(w=>`<option value="${w}">${semanaLabel(w)}</option>`).join('');
    if(!ws.includes(state.semana)) state.semana=ws[ws.length-1];
    $('selSemana').value=state.semana;
  }

  $('selMes').innerHTML=mesesAtivos.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');
  $('selMes').value=state.mes;
  renderSemanaOptions();
  $('selEstr').innerHTML=`<option value="all">Todas</option>`+STR_ORDER.map(s=>`<option value="${s}">${s}</option>`).join('');

  $('selMes').onchange=e=>{
    state.mes=e.target.value;
    const ws=weeksInMonth(state.mes,semanasAtivas);
    state.semana=ws[ws.length-1]||state.semana;
    renderSemanaOptions();
    renderSemanal();
  };
  $('selSemana').onchange=e=>{state.semana=e.target.value;renderSemanal();};
  $('selEstr').onchange=e=>{state.estr=e.target.value;renderSemanal();};
  $('selRef').onchange=e=>{state.ref=e.target.value;renderSemanal();};
}
function metricsForSemana(src,semana,estr){
  const m=D[src]?.semanal?.[semana]; if(!m)return null;
  if(estr==='all')return m.total;
  return m.porEstrategia?.[estr]||null;
}
const KPIS=[{k:'receita',lbl:'Net Revenue',cur:1,desc:'Receita líquida da semana'},{k:'gmv',lbl:'GMV',cur:1,desc:'Volume bruto transacionado'},
  {k:'cw',lbl:'Closed Won',cur:0,desc:'Negócios fechados na semana'},{k:'activation',lbl:'Ativações',cur:0,desc:'Contas ativadas (10k GMV)'},{k:'sap',lbl:'SAP',cur:0,desc:'Sales Accepted Prospects'}];
function kpisHTML(act,ref){
  return KPIS.map(c=>{
    const a=act?act[c.k]:0, b=ref?ref[c.k]:0;
    const p=pct(a,b);
    const val=a>0?(c.cur?fBRL(a):fN(a)):'<span class="miss">—</span>';
    const budv=b>0?(c.cur?fBRL(b):fN(b)):'—';
    const w=p==null?0:Math.min(100,p);
    return `<div class="kpi"><span class="rail"></span>
      <div class="lbl">${c.lbl}</div>
      <div class="sub2">${c.desc||''}</div>
      <div class="num ${c.cur?'':'n'}">${val}</div>
      <div class="sub"><span>meta ${budv}</span>${p!=null?`<span class="att ${attClass(p)}">${p}%</span>`:''}</div>
      <div class="prog"><i style="width:${w}%;background:${p!=null&&p<80?'var(--danger)':'var(--accent)'}"></i></div>
    </div>`;
  }).join('');
}
const FUNNEL=[['Contacted','contacted'],['Connected','connected'],['Opps','opps'],['SQL','sql'],['CW','cw'],['Activation','activation']];
function funnelHTML(act,ref){
  const vals=FUNNEL.map(([,k])=>act?act[k]:0);
  const max=Math.max(...vals,1);
  let h='';
  FUNNEL.forEach(([nm,k],i)=>{
    const v=act?act[k]:0, b=ref?ref[k]:0;
    const w=25+(v/max)*75;
    const bpos=b>0?Math.min(100,25+(b/max)*75):null;
    h+=`<div class="fstage"><div class="nm">${nm}</div>
      <div class="track"><div class="fill" style="width:${w}%;background:${i>=4?'var(--accent)':'#344054'}">${fN(v)}</div>
      ${bpos!=null?`<div class="bud" style="left:${bpos}%" data-b="${fN(b)}"></div>`:''}</div></div>`;
    if(i<FUNNEL.length-1){const nx=act?act[FUNNEL[i+1][1]]:0;const c=v>0?Math.round(nx/v*100):0;
      h+=`<div class="conv">↓ ${c}%</div>`;}
  });
  return h;
}
function estrHTML(semana){
  const m=D.actual.semanal[semana], mb=D[state.ref].semanal[semana];
  const rows=STR_ORDER.map(s=>({s,cw:m?.porEstrategia?.[s]?.cw||0,bud:mb?.porEstrategia?.[s]?.cw||0}));

function renderAreaSdr(){
  const week=state.semanaArea;
  const base=D.porPessoa?.sdr||[];
  const list=base.map(p=>weekView(p,week,SDR_DEF)).sort((a,b)=>b.opps-a.opps);
  // ===== filtro de sales_strategy (Outbound/Inbound/Hunting) — vale pra página SDR inteira =====
  const estrF=state.estrArea||'all';
  const listF=estrF==='all'?list:list.filter(p=>p.estrategia===estrF);
  // KPIs de entrada/conexão/opps vêm do agregado por estratégia (preciso, por lead)
  const semAgg=D.actual?.semanal?.[week];
  const agg=estrF==='all'?semAgg?.total:semAgg?.porEstrategia?.[estrF];
  const totContacted=agg?.contacted||0, totConnected=agg?.connected||0, totOpps=agg?.opps||0;
  const refAgg=estrF==='all'?D[state.refArea]?.semanal?.[week]?.total:D[state.refArea]?.semanal?.[week]?.porEstrategia?.[estrF];
  const refT=refAgg;
  // Estoque do funil na POSIÇÃO da semana selecionada (snapshot), na estratégia filtrada
  const eCur=(D.sdrEstoque?.[estrF]||[]).find(e=>e.semana===week);
  const estTot=eCur?eCur.contacted+eCur.connected+eCur.nurturing:null;
  // Saídas do funil na semana = oportunidades geradas + unqualifieds (sem meta)
  const totUnq=(D.sdrUnq?.[estrF]||{})[week]||0;
  const totSaidas=totOpps+totUnq;
  // delta de estoque da semana = entradas − saídas = contatados − opps − unqualifieds
  const deltaEst=totContacted-totOpps-totUnq;
  const deltaPill=`Δ estoque <span class="att ${deltaEst>=0?'hi':'lo'}">${deltaEst>=0?'▲ +':'▼ '}${fN(deltaEst)}</span>`;
  // Coorte contato→conexão: dos contatados na semana, quantos conectaram na PRÓPRIA semana.
  // Referência fixa de 10% (não vem de budget — é uma meta operacional combinada à parte).
  const coh=(D.sdrCohort?.[estrF]||{})[week]||null;
  const cohPct=coh&&coh.contacted?Math.round(coh.conn/coh.contacted*100):null;
  const COH_META=10;
  const cohAtt=cohPct!=null?pct(cohPct,COH_META):null;
  // FTE — SDRs que de fato contataram / geraram opp na semana (Backlog: usar base de headcount real)
  const contactFteCount=(D.sdrContactFte?.[estrF]||{})[week]||0;
  const oppFteCount=(D.sdrOppFte?.[estrF]||{})[week]||0;
  const contatadosFte=totContacted/Math.max(1,contactFteCount);
  const oppsFte=totOpps/Math.max(1,oppFteCount);
  // dias úteis já decorridos na semana (fechada = 5; em curso = só os que já passaram)
  const diasUteis=D.diasUteisSemana?.[week]||0;
  const contatadosFteDia=diasUteis?contatadosFte/diasUteis:null;
  const oppsFteDia=diasUteis?oppsFte/diasUteis:null;
  const kpis=[
    ['Entradas',fN(totContacted),metaSub(totContacted,refT?.contacted,`${listF.length} SDRs`),'Contatados'],
    ['Saídas do funil',fN(totSaidas),`${fN(totOpps)} opps · ${fN(totUnq)} unqualifieds`,'Oportunidades geradas + unqualifieds'],
    ['Estoque atual',estTot!=null?fN(estTot):'—',deltaPill,'Funil de SDR atual'],
    ['Contacted → Connected',cohPct!=null?cohPct+'%':'—',coh?`${fN(coh.conn)}/${fN(coh.contacted)} · meta ${COH_META}%${cohAtt!=null?` · <span class="att ${attClass(cohAtt)}">${cohAtt}%</span>`:''}`:'sem dado','Coorte: conectou na mesma semana'],
    ['Contacted / FTE',contatadosFte.toFixed(0),`${contactFteCount} SDRs · ${contatadosFteDia!=null?contatadosFteDia.toFixed(1)+'/dia útil':'—'} (${diasUteis}d)`,'Contatados ÷ SDRs que contataram'],
    ['Opps / FTE',oppsFte.toFixed(1),`${oppFteCount} SDRs · ${oppsFteDia!=null?oppsFteDia.toFixed(2)+'/dia útil':'—'} (${diasUteis}d)`,'Oportunidades ÷ SDRs com opp'],
  ];
  const oppsNivelSrc=D.sdrOppsNivel?.[estrF]||{};
  const wt=NIV.map((n,i)=>`<div class="card">${weekTrendHTML({label:n,color:NIV_COLOR[n],series:weeklyByNivel(oppsNivelSrc,n).slice(-8)})}</div>`).join('');
  // resumo de produtividade por FTE (uma linha)
  const prodResumo=`<div class="card" style="display:flex;gap:30px;flex-wrap:wrap;align-items:center;padding:16px 22px">
    <span class="eyebrow">Produtividade por FTE · ${semanaLabel(week)}${estrF!=='all'?' · '+estrF:''}</span>
    <span><b style="font-size:16px">${contactFteCount}</b> <span style="color:var(--text-muted);font-size:12px">FTEs (contataram)</span></span>
    <span><b style="font-size:16px">${contatadosFte.toFixed(0)}</b> <span style="color:var(--text-muted);font-size:12px">contatados/FTE</span></span>
    <span><b style="font-size:16px">${contatadosFteDia!=null?contatadosFteDia.toFixed(1):'—'}</b> <span style="color:var(--text-muted);font-size:12px">contatados/FTE/dia útil (${diasUteis}d)</span></span>
    <span><b style="font-size:16px">${oppFteCount}</b> <span style="color:var(--text-muted);font-size:12px">FTEs (geraram opp)</span></span>
    <span><b style="font-size:16px">${oppsFte.toFixed(1)}</b> <span style="color:var(--text-muted);font-size:12px">opps/FTE</span></span>
    <span><b style="font-size:16px">${oppsFteDia!=null?oppsFteDia.toFixed(2):'—'}</b> <span style="color:var(--text-muted);font-size:12px">opps/FTE/dia útil (${diasUteis}d)</span></span>
  </div>`;
  // semanas de referência (atual, −1, −2) + lookup do acumulado por pessoa
  const idxW=D.semanas.indexOf(week);
  const wB=D.semanas[idxW-1]||null, wC=D.semanas[idxW-2]||null;
  const baseByEmail={}; base.forEach(p=>baseByEmail[p.email]=p);
  const oppsAt=(r,w)=>{const x=w&&(r.porSemana||{})[w];return x?(x.opps||0):0;};
  const connAt=(r,w)=>{const x=w&&(r.porSemana||{})[w];return (x&&x.contactRate!=null)?Math.round(x.contactRate*100):null;};
  const nivelPct=(r,i)=>{const a=baseByEmail[r.email]?.oppNivel||[0,0,0];const t=(a[0]+a[1]+a[2])||1;return Math.round((a[i]||0)/t*100);};
  const cols=[

    {key:'connB',label:'−1',align:'r',render:r=>`<span class="mono">${connAt(r,wB)!=null?connAt(r,wB)+'%':'—'}</span>`},
    {key:'connC',label:'−2',align:'r',render:r=>`<span class="mono">${connAt(r,wC)!=null?connAt(r,wC)+'%':'—'}</span>`},
    {key:'n1',label:'N2-N3',align:'r',render:r=>`<span class="mono">${nivelPct(r,0)}%</span>`},
    {key:'n2',label:'N4-N5',align:'r',render:r=>`<span class="mono">${nivelPct(r,1)}%</span>`},
    {key:'n3',label:'N6+',align:'r',render:r=>`<span class="mono">${nivelPct(r,2)}%</span>`},
    {key:'pd',label:'Prod/dia sem.',align:'r',render:r=>`<span class="mono">${(oppsAt(r,week)/5).toFixed(1)}</span>`},
    {key:'pd3',label:'Prod/dia 3s',align:'r',render:r=>`<span class="mono">${((oppsAt(r,week)+oppsAt(r,wB)+oppsAt(r,wC))/15).toFixed(1)}</span>`},
  ];
  // só SDRs com pelo menos 1 opp em uma das 3 últimas semanas (atual, −1, −2)
  const listTbl=listF.filter(r=>(oppsAt(r,week)+oppsAt(r,wB)+oppsAt(r,wC))>0);

  const totWt=weekTrendHTML({label:'Total',color:'var(--accent)',series:weeklyTotals(D.semanalPorNivel?.cw).slice(-4)});
  const cols=[
    {key:'opps',label:'Opp in',render:r=>`<span class="mono">${fN(r.opps)}</span>`},
    {key:'sqlRate',label:'Opp→SQL',align:'r',render:r=>`<span class="mono">${r.sqlRate!=null?pctR(r.sqlRate)+'%':'—'}</span>`},
    {key:'winRate',label:'Win rate',align:'r',render:r=>`<span class="mono" style="color:${r.winRate!=null&&r.winRate<0.2?'var(--danger)':'inherit'}">${r.winRate!=null?pctR(r.winRate)+'%':'—'}</span>`},
    {key:'cw',label:'CW in',render:r=>`<span class="mono num-cell">${fN(r.cw)}</span>`},
    {key:'cwNivel',label:'CW por nível',render:r=>ministack(r.cwNivel,NIV.map(n=>NIV_COLOR[n]))},
    {key:'diasOppSql',label:'Ciclo Opp→SQL',align:'r',render:r=>`<span class="mono">${r.diasOppSql!=null?r.diasOppSql+'d':'—'}</span>`},
    {key:'diasSqlWon',label:'Ciclo SQL→CW',align:'r',render:r=>`<span class="mono">${r.diasSqlWon!=null?r.diasSqlWon+'d':'—'}</span>`},
  ];
  const table=groupedTable({rows:list,cols,kind:'closer'});
  $('viewArea').innerHTML=`
    <div class="grid g${kpis.length}">${kpis.map(([l,v,s,d])=>`<div class="kpi"><span class="rail"></span><div class="lbl">${l}</div><div class="sub2">${d||''}</div><div class="num n">${v}</div><div class="sub"><span>${s}</span></div></div>`).join('')}</div>
    <div class="sec" style="margin-top:24px"><div class="sec-head"><h2>CW por nível de cliente · últimas 4 semanas</h2></div>
      <div class="card"><div class="wtgrid g3">${wt}</div></div></div>
    <div class="sec"><div class="sec-head"><h2>CW total · últimas 4 semanas</h2></div><div class="card">${totWt}</div></div>
    <div class="sec"><div class="sec-head"><h2>Closers · entrada, conversão e CW por nível</h2><span class="hint">${semanaLabel(week)} · sem agrupamento fixo por squad — cada closer atende níveis variados; ver coluna "CW por nível". Pipeline aberto e aging de opp não existem na base hoje.</span></div>${table}</div>`;
  bindRowClicks($('viewArea'));
}
function renderAreaOnboarding(){
  const week=state.semanaArea;
  const base=D.porPessoa?.onboarding||[];
  const list=base.map(p=>weekView(p,week,ONB_DEF)).sort((a,b)=>b.activated-a.activated);
  const totCwIn=sum(list,p=>p.cwIn), totAct=sum(list,p=>p.activated);
  const port=D.actual?.semanal?.[week]?.total;
  const refT=D[state.refArea]?.semanal?.[week]?.total;
  const kpis=[
    ['Net Revenue · semana',fBRL(port?.receita),metaSub(port?.receita||0,refT?.receita,'portfólio (sem quebra por pessoa)',true),'Receita do portfólio'],
    ['GMV · semana',fBRL(port?.gmv),metaSub(port?.gmv||0,refT?.gmv,'portfólio (sem quebra por pessoa)',true),'Volume do portfólio'],
    ['CW in / Ativados',`${fN(totCwIn)} / ${fN(totAct)}`,refT?`meta ${fN(refT.cw)} / ${fN(refT.activation)}`:`${base.length} onboarders`,'Recebidos vs ativados 10k'],
    ['Taxa de ativação',`${pct(totAct,totCwIn)??'—'}%`,'ativados 10k ÷ CW recebido','Ativados ÷ CW recebido'],
  ];
  const wt=NIV.map(n=>weekTrendHTML({label:n,color:NIV_COLOR[n],series:weeklyByNivel(D.semanalPorNivel?.activation,n).slice(-4)})).join('');
  const totWt=weekTrendHTML({label:'Total',color:'var(--accent)',series:weeklyTotals(D.semanalPorNivel?.activation).slice(-4)});
  const cols=[
    {key:'cwIn',label:'CW in',render:r=>`<span class="mono">${fN(r.cwIn)}</span>`},
    {key:'activated',label:'Ativados 10k',render:r=>`<span class="mono num-cell">${fN(r.activated)}</span>`},
    {key:'actRate',label:'Taxa ativação',align:'r',render:r=>`<span class="mono">${r.actRate!=null?pctR(r.actRate)+'%':'—'}</span>`},
    {key:'actNivel',label:'Ativação por nível',render:r=>ministack(r.actNivel,NIV.map(n=>NIV_COLOR[n]))},
    {key:'diasWonAtivacao',label:'Ciclo CW→Ativação',align:'r',render:r=>`<span class="mono">${r.diasWonAtivacao!=null?r.diasWonAtivacao+'d':'—'}</span>`},
    {key:'nr',label:'Net Revenue',align:'r',render:()=>'<span class="miss">sem dado por pessoa</span>'},
  ];
  const table=groupedTable({rows:list,cols,kind:'onb'});
  $('viewArea').innerHTML=`
    <div class="grid g${kpis.length}">${kpis.map(([l,v,s,d])=>`<div class="kpi"><span class="rail"></span><div class="lbl">${l}</div><div class="sub2">${d||''}</div><div class="num n">${v}</div><div class="sub"><span>${s}</span></div></div>`).join('')}</div>
    <div class="sec" style="margin-top:24px"><div class="sec-head"><h2>Ativações (10k GMV) por nível · últimas 4 semanas</h2></div>
      <div class="card"><div class="wtgrid g3">${wt}</div></div></div>
    <div class="sec"><div class="sec-head"><h2>Ativações total · últimas 4 semanas</h2></div><div class="card">${totWt}</div></div>
    <div class="sec"><div class="sec-head"><h2>Onboarding · CW recebido, ativação e ciclo</h2><span class="hint">${semanaLabel(week)} · Net Revenue/GMV por onboarder nomeado não existem na base hoje (só agregado por nível/semana)</span></div>${table}</div>`;
  bindRowClicks($('viewArea'));
}
function renderArea(){
  if(state.area==='sdr') renderAreaSdr();
  else if(state.area==='closers') renderAreaClosers();
  else renderAreaOnboarding();
}
// mesmo modelo de cascata Mês → Semana da Semanal Sales, com estado próprio (mesArea/
// semanaArea) já que a aba tem seus próprios controles no topbar.
function initWareaControls(){
  const semanasAtivas=D.semanas.filter(w=>D.actual.semanal[w]);
  const mesesAtivos=[...new Set(semanasAtivas.map(w=>D.semanaMes[w]))].filter(m=>m.startsWith(FILTRO_ANO)).sort();
  const comFunil=Object.keys(D.actual.semanal).filter(w=>D.actual.semanal[w].total.contacted>0).sort();
  const def=comFunil.pop()||semanasAtivas[semanasAtivas.length-1];
  state.semanaArea=def&&semanasAtivas.includes(def)?def:semanasAtivas[semanasAtivas.length-1];
  state.mesArea=D.semanaMes[state.semanaArea]||mesesAtivos[mesesAtivos.length-1];

  function renderSemanaOptions(){
    const ws=weeksInMonth(state.mesArea,semanasAtivas);
    $('selSemanaArea').innerHTML=ws.map(w=>`<option value="${w}">${semanaLabel(w)}</option>`).join('');
    if(!ws.includes(state.semanaArea)) state.semanaArea=ws[ws.length-1];
    $('selSemanaArea').value=state.semanaArea;
  }

  $('selMesArea').innerHTML=mesesAtivos.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');
  $('selMesArea').value=state.mesArea;
  renderSemanaOptions();

  $('selMesArea').onchange=e=>{
    state.mesArea=e.target.value;
    const ws=weeksInMonth(state.mesArea,semanasAtivas);
    state.semanaArea=ws[ws.length-1]||state.semanaArea;
    renderSemanaOptions();
    renderArea();
  };
  $('selSemanaArea').onchange=e=>{state.semanaArea=e.target.value;renderArea();};
  $('selEstrArea').innerHTML=`<option value="all">Todas</option>`+STR_ORDER.map(s=>`<option value="${s}">${s}</option>`).join('');
  $('selEstrArea').value=state.estrArea;
  $('selEstrArea').onchange=e=>{state.estrArea=e.target.value;renderArea();};
  $('selRefArea').value=state.refArea;
  $('selRefArea').onchange=e=>{state.refArea=e.target.value;renderArea();};
}
// projeta uma pessoa nos números DAQUELA semana (fallback nos defaults se não tiver
// atividade na semana) — os totais acumulados de p ficam só pra ordenação/1:1 Gestor.
function weekView(p,week,defaults){
  const pw=(p.porSemana||{})[week];
  return {...p,...defaults,...(pw||{})};
}

// ================= 1:1 GESTOR =================
const ROLE_CFG={
  sdr:{label:'SDR',color:'var(--accent)',metricKey:'opps',metricLabel:'Opps / semana'},
  closer:{label:'Closer',color:'var(--accent)',metricKey:'cw',metricLabel:'CW / semana'},
  onb:{label:'Onboarding',color:'var(--accent)',metricKey:'activated',metricLabel:'Ativações / semana'},
};
function allPeople(){
  // 1:1 Gestor é reunião com quem está na casa hoje — só entra quem a planilha de
  // diretório (Imagens Sales.csv) marca como Ativo = "Sim". Sem match = fica de fora.
  return [
    ...(D.porPessoa?.sdr||[]).map(p=>({p,kind:'sdr'})),
    ...(D.porPessoa?.closer||[]).map(p=>({p,kind:'closer'})),
    ...(D.porPessoa?.onboarding||[]).map(p=>({p,kind:'onb'})),
  ].filter(x=>x.p.ativo);
}
function indicadores(p,kind){
  if(kind==='sdr') return [['Contatados',fN(p.contacted)],['Contact → Connected',p.contactRate!=null?pctR(p.contactRate)+'%':'—'],['Opp in',fN(p.opps)],['Opp por nível (N2-N3/N4-N5/N6+)',p.oppNivel.map(fN).join(' · ')],['Ciclo contato→conectado',p.diasContatoConectado!=null?p.diasContatoConectado+'d':'—']];
  if(kind==='closer') return [['Opp in',fN(p.opps)],['Opp → SQL',p.sqlRate!=null?pctR(p.sqlRate)+'%':'—'],['SQL',fN(p.sql)],['Win rate',p.winRate!=null?pctR(p.winRate)+'%':'—'],['CW in',fN(p.cw)],['CW por nível (N2-N3/N4-N5/N6+)',p.cwNivel.map(fN).join(' · ')],['Ciclo Opp→SQL',p.diasOppSql!=null?p.diasOppSql+'d':'—'],['Ciclo SQL→CW',p.diasSqlWon!=null?p.diasSqlWon+'d':'—']];
  return [['CW in',fN(p.cwIn)],['Ativados 10k',fN(p.activated)],['Taxa de ativação',p.actRate!=null?pctR(p.actRate)+'%':'—'],['Ativação por nível (N2-N3/N4-N5/N6+)',p.actNivel.map(fN).join(' · ')],['Ciclo CW→Ativação',p.diasWonAtivacao!=null?p.diasWonAtivacao+'d':'—']];
}
function coaching(p,kind,squadArr,squadKey){
  const med=median(squadArr.map(x=>x[squadKey]));
  const mine=p[squadKey]||0;
  const d=[],m=[];let acao='';
  if(kind==='sdr'){
    if(p.contactRate!=null&&p.contactRate>=0.6)d.push(`Boa cobertura de contatos (${pctR(p.contactRate)}%)`);
    if(mine>=med)d.push('Opps acima da mediana do squad');
    if(p.contactRate!=null&&p.contactRate<0.45)m.push(`Cobertura de contatos baixa (${pctR(p.contactRate)}%)`);
    if(mine<med)m.push(`Opps abaixo da mediana do squad (${fN(mine)} vs ${fN(med)})`);
    acao=mine<med?'Priorizar geração de opps essa semana para recuperar o pacing do squad.':'Manter cadência e reforçar qualificação para melhorar a taxa de conexão.';
  } else if(kind==='closer'){
    if(p.winRate!=null&&p.winRate>=0.3)d.push(`Win rate forte (${pctR(p.winRate)}%)`);
    if(mine>=med)d.push('CW acima da mediana do squad');
    if(p.winRate!=null&&p.winRate<0.2)m.push(`Win rate abaixo do esperado (${pctR(p.winRate)}%)`);
    if(mine<med)m.push(`CW abaixo da mediana do squad (${fN(mine)} vs ${fN(med)})`);
    acao=(p.winRate!=null&&p.winRate<0.2)?'Revisar critério de qualificação dos deals com o gestor.':(mine<med?'Priorizar avanço das opps em aberto para recuperar o pacing.':'Manter ritmo e repassar abordagem para os pares do squad.');
  } else {
    if(p.actRate!=null&&p.actRate>=0.5)d.push(`Ativação alta (${pctR(p.actRate)}%)`);
    if(mine>=med)d.push('Ativações acima da mediana do squad');
    if(p.actRate!=null&&p.actRate<0.35)m.push(`Ativação baixa (${pctR(p.actRate)}%)`);
    if(mine<med)m.push(`Ativações abaixo da mediana do squad (${fN(mine)} vs ${fN(med)})`);
    acao=(p.actRate!=null&&p.actRate<0.35)?'Revisar contas paradas com o gestor antes que virem churn.':(mine<med?'Focar nas contas mais próximas de bater 10k GMV essa semana.':'Documentar o que está funcionando e replicar com o squad.');
  }
  if(!d.length)d.push('Desempenho dentro do esperado no período.');
  if(!m.length)m.push('Sem gargalo relevante identificado no período.');
  return {destaques:d,melhorar:m,acao,med,mine};
}
function renderOneOne(){
  const people=allPeople();
  if(!people.length){ $('viewOneOne').innerHTML='<div class="card"><span class="miss">Sem pessoas com dado — rode build_data.js com os CSVs atualizados.</span></div>'; return; }
  if(!state.pessoa||!people.find(x=>x.p.email===state.pessoa.email&&x.kind===state.pessoa.kind)){
    state.pessoa={email:people[0].p.email,kind:people[0].kind};
  }
  const sel=people.find(x=>x.p.email===state.pessoa.email&&x.kind===state.pessoa.kind);
  const q=(state.q||'').toLowerCase();
  const groups=[['sdr','SDR'],['closer','Closers'],['onb','Onboarding']];
  const sideHTML=groups.map(([kind,label])=>{
    const items=people.filter(x=>x.kind===kind&&(shortEmail(x.p.email).toLowerCase().includes(q)||displayName(x.p).toLowerCase().includes(q)));
    if(!items.length)return '';
    return `<div class="eyebrow" style="margin:10px 4px 4px">${label} · ${items.length}</div>`+
      items.map(x=>`<div class="oneone-item ${state.pessoa.email===x.p.email&&state.pessoa.kind===x.kind?'on':''}" data-email="${x.p.email}" data-kind="${x.kind}">${avatarHTML(x.p,24)}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${displayName(x.p)}</span></div>`).join('');
  }).join('');

  const cfg=ROLE_CFG[sel.kind];
  const squadArr=sel.kind==='sdr'?D.porPessoa.sdr:sel.kind==='closer'?D.porPessoa.closer:D.porPessoa.onboarding;
  const co=coaching(sel.p,sel.kind,squadArr,cfg.metricKey);
  const vsMed=co.med?Math.round((co.mine-co.med)/co.med*100):null;
  const wt=weekTrendHTML({label:displayName(sel.p).split(' ')[0],color:cfg.color,series:sel.p.semanal||[]});

  $('viewOneOne').innerHTML=`<div class="oneone">
    <div class="oneone-side">
      <input id="oneoneSearch" placeholder="Buscar pessoa…" value="${state.q||''}"/>
      ${sideHTML}
    </div>
    <div>
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:14px">
          ${avatarHTML(sel.p,52)}
          <div><div class="eyebrow">${cfg.label} · ${sel.p.email}</div><div style="font-size:22px;font-weight:700;margin-top:2px">${displayName(sel.p)}</div></div>
        </div>
        <div class="statrow">
          <div class="stat"><div class="eyebrow" style="color:var(--text-faint)">Resultado (período)</div><div class="v">${fN(co.mine)}</div></div>
          <div class="stat"><div class="eyebrow" style="color:var(--text-faint)">Mediana do squad</div><div class="v">${fN(Math.round(co.med))}</div></div>
          <div class="stat"><div class="eyebrow" style="color:var(--text-faint)">vs mediana</div><div class="v" style="color:${vsMed==null?'inherit':vsMed>=0?'var(--success)':'var(--danger)'}">${vsMed==null?'—':(vsMed>=0?'+':'')+vsMed+'%'}</div></div>
        </div>
      </div>
      <div class="grid g2">
        <div class="card"><div class="eyebrow" style="margin-bottom:14px">${cfg.metricLabel} · últimas 4 semanas</div>${wt}</div>
        <div class="card"><div class="eyebrow" style="margin-bottom:8px">Indicadores do período</div>
          ${indicadores(sel.p,sel.kind).map(([k,v])=>`<div class="indic"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}</div>
      </div>
      <div class="coachgrid" style="margin-top:16px">
        <div class="card coachbox"><div class="eyebrow" style="color:var(--success);margin-bottom:10px">Destaques</div><ul>${co.destaques.map(t=>`<li>${t}</li>`).join('')}</ul></div>
        <div class="card coachbox"><div class="eyebrow" style="color:var(--warn);margin-bottom:10px">A melhorar</div><ul>${co.melhorar.map(t=>`<li>${t}</li>`).join('')}</ul></div>
        <div class="card coachbox"><div class="eyebrow" style="color:var(--accent);margin-bottom:10px">Ação da semana</div><ul><li>${co.acao}</li></ul></div>
      </div>
    </div>
  </div>`;
  $('oneoneSearch').oninput=e=>{state.q=e.target.value;renderOneOne();};
  $('viewOneOne').querySelectorAll('.oneone-item').forEach(el=>{
    el.onclick=()=>{state.pessoa={email:el.dataset.email,kind:el.dataset.kind};renderOneOne();};
  });
}

// ================= NAV / RENDER =================
const CTX={mensal:'Mês fechado',wsales:'Semana · estoque do funil + produtividade por nível',warea:'Semana · detalhe por FTE',oneone:'Semana · 1:1 gestor ↔ funcionário'};
function renderTabs(){
  $('tabs').innerHTML=MEETINGS.map(t=>`<div class="tab ${state.meeting===t.k?'on':''}" data-k="${t.k}"><span class="ic">${IC[t.k]||''}</span><span>${t.label}</span></div>`).join('');
  $('tabs').querySelectorAll('.tab').forEach(el=>el.onclick=()=>{state.meeting=el.dataset.k;document.body.classList.remove('side-open');render();});
  $('subtabs').innerHTML=AREA_TABS.map(t=>`<div class="subtab ${state.area===t.k?'on':''}" data-k="${t.k}">${t.label}</div>`).join('');
  $('subtabs').querySelectorAll('.subtab').forEach(el=>el.onclick=()=>{state.area=el.dataset.k;render();});
}
function updateBanner(){
  if(D.funilCompleto===false){
    $('bannerText').innerHTML=`<b>Dados agregados</b> das bases NB + budget/reforecast. <b class="miss" style="color:var(--danger);font-style:normal">Funil completo (Contatado/Conectado/SQL por mês) parcial</b> — falta reexportar <code>Dados/05_produtividade.csv</code> (ver Dados/README.md).`;
  } else {
    $('bannerText').innerHTML=`<b>Dados agregados</b> das bases NB + budget/reforecast. Gerado em <b>${D.geradoEm||'—'}</b>.`;
  }
}
function render(){
  renderTabs();
  const mt=MEETINGS.find(m=>m.k===state.meeting);
  $('pageTitle').textContent=mt?mt.label:'';
  $('ctxLine').textContent=CTX[state.meeting]+(state.meeting==='mensal'&&state.mesMensal?(' · '+mesLabel(state.mesMensal)):'');
  $('wsalesControls').style.display=state.meeting==='wsales'?'flex':'none';
  $('wareaControls').style.display=state.meeting==='warea'?'flex':'none';
  $('mensalControls').style.display=state.meeting==='mensal'?'flex':'none';
  $('otherControls').style.display=state.meeting==='oneone'?'flex':'none';
  $('subbar').style.display=state.meeting==='warea'?'block':'none';
  if($('ctlEstrArea')) $('ctlEstrArea').style.display=(state.meeting==='warea'&&state.area==='sdr')?'flex':'none';
  $('viewMensal').style.display=state.meeting==='mensal'?'block':'none';
  $('viewSemanal').style.display=state.meeting==='wsales'?'block':'none';
  $('viewArea').style.display=state.meeting==='warea'?'block':'none';
  $('viewOneOne').style.display=state.meeting==='oneone'?'block':'none';
  if(state.meeting==='mensal') renderMensal();
  else if(state.meeting==='wsales') renderSemanal();
  else if(state.meeting==='warea') renderArea();
  else renderOneOne();
}

$('genAt').textContent='dados de '+(D.geradoEm||'—');
$('menuBtn').onclick=()=>document.body.classList.toggle('side-open');
$('scrim').onclick=()=>document.body.classList.remove('side-open');
updateBanner();
initWsalesControls();
initWareaControls();
initMensalControls();
render();
</script>
